name: Deployment
on:
  push:
    branches:
      - main
      - dev
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: echo "..."
  deploy:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo
        env:
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg MONGODB_CONNECTION_PROTOCOL=mongodb+srv \
            --build-arg MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }} \
            --build-arg MONGODB_CLUSTER_ADDRESS=${{ secrets.MONGODB_CLUSTER_ADDRESS }} \
            --build-arg MONGODB_USERNAME=${{ secrets.MONGODB_USERNAME }} \
            --build-arg MONGODB_PASSWORD=${{ secrets.MONGODB_PASSWORD }} \
            -t my-app:latest .
      - name: Run tests in container
        env:
          MONGODB_CONNECTION_PROTOCOL: mongodb+srv
          MONGODB_CLUSTER_ADDRESS: ${{ secrets.MONGODB_CLUSTER_ADDRESS }}
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          PORT: 8080
        run: |
          docker run --rm \
            --network host \
            -e MONGODB_CONNECTION_PROTOCOL \
            -e MONGODB_CLUSTER_ADDRESS \
            -e MONGODB_USERNAME \
            -e MONGODB_PASSWORD \
            -e PORT \
            my-app:latest npm test
      - name: Output information
        run: |        
          echo "..."
